<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haroon Fonts Pro - Monetize Edition</title>

<meta name="description" content="Free stylish text generator with 150+ fonts, copy tools and symbols.">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
transition:0.3s;
}

.light{background:#f2f2f2;color:black;}

header{
text-align:center;
padding:15px;
font-size:22px;
color:#00ffcc;
font-weight:bold;
}

.container{text-align:center;padding:10px;}

input{
width:85%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin:8px;
outline:none;
}

button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00cc66;
color:white;
}

.mode{background:#ffcc00;color:black;}

.box{
background:#1c1c1c;
padding:12px;
margin:10px;
border-radius:12px;
word-break:break-word;
animation:fade 0.2s ease;
}

.light .box{background:#fff;border:1px solid #ddd;}

@keyframes fade{
from{opacity:0;transform:scale(0.95);}
to{opacity:1;transform:scale(1);}
}

.copy{background:#0077ff;}
.star{background:#ff4d88;}

.tabs button{background:#333;margin:3px;}

.symbols span{
font-size:26px;
margin:5px;
cursor:pointer;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#00cc66;
padding:10px 20px;
border-radius:10px;
display:none;
}

.share{
background:#25d366;
}

.small{
font-size:12px;
opacity:0.7;
text-align:center;
margin-top:20px;
}

.adbox{
margin:15px;
padding:15px;
background:#222;
border-radius:10px;
font-size:14px;
color:#aaa;
}
</style>
</head>

<body>

<header>🔥 Haroon Fonts Pro Monetize Edition 🔥</header>

<div class="container">

<input id="text" placeholder="Type your text...">

<br>

<button onclick="generate()">Generate</button>
<button class="mode" onclick="toggleMode()">Light/Dark</button>

<input id="search" placeholder="Search styles..." oninput="filter()">

<div class="tabs">
<button onclick="setCat('all')">ALL</button>
<button onclick="setCat('cool')">COOL</button>
<button onclick="setCat('aes')">AESTHETIC</button>
<button onclick="setCat('ff')">FF</button>
</div>

<div id="output"></div>

<div class="adbox">
📢 Ad Space (Yahan Google AdSense lagana hai later)
</div>

<h3>⭐ Favorites</h3>
<div id="fav"></div>

<h3>💖 Symbols</h3>
<div class="symbols">
<span onclick="addSym('❤️')">❤️</span>
<span onclick="addSym('🔥')">🔥</span>
<span onclick="addSym('✨')">✨</span>
<span onclick="addSym('⚡')">⚡</span>
<span onclick="addSym('💎')">💎</span>
<span onclick="addSym('🌸')">🌸</span>
<span onclick="addSym('🌙')">🌙</span>
</div>

<p class="small">
Made by haroon824bytes | Insta: silent.closure | Email: haroonnoor824@gmail.com
</p>

</div>

<div class="toast" id="toast">Copied 🔥</div>

<script>

let cat="all";
let favs=JSON.parse(localStorage.getItem("favs")||"[]");

function styles(t){
return {
cool:["★ "+t+" ★","✦ "+t+" ✦","🔥 "+t,"⚡ "+t,t.toUpperCase()],
aes:["♡ "+t+" ♡","☁ "+t+" ☁","🌸 "+t+" 🌸","✧ "+t],
ff:["FF★"+t,"🔥 FF "+t,"⚡ "+t+" FF"],
all:["★ "+t+" ★","♡ "+t+" ♡","🔥 "+t,"⚡ "+t,
"☁ "+t+" ☁","🌸 "+t+" 🌸",t.toUpperCase()]
};
}

function generate(){
let t=document.getElementById("text").value;
if(!t) return;
render(styles(t)[cat]);
}

function render(arr){
let out=document.getElementById("output");
out.innerHTML="";

arr.forEach(t=>{

let div=document.createElement("div");
div.className="box";

div.innerHTML=`
${t}
<br>
<button class="copy" onclick="copyText('${t}')">Copy</button>
<button class="share" onclick="shareText('${t}')">Share</button>
<button class="star" onclick="addFav('${t}')">⭐</button>
`;

out.appendChild(div);

});

}

function copyText(t){
navigator.clipboard.writeText(t);
toast();
}

function shareText(t){
let url="https://wa.me/?text="+encodeURIComponent(t);
window.open(url,"_blank");
}

function toast(){
let x=document.getElementById("toast");
x.style.display="block";
setTimeout(()=>x.style.display="none",1200);
}

function addFav(t){
if(!favs.includes(t)){
favs.push(t);
localStorage.setItem("favs",JSON.stringify(favs));
showFav();
}
}

function showFav(){
let f=document.getElementById("fav");
f.innerHTML="";
favs.forEach(t=>{
let d=document.createElement("div");
d.className="box";
d.innerHTML=`
${t}
<br>
<button class="copy" onclick="copyText('${t}')">Copy</button>
`;
f.appendChild(d);
});
}
showFav();

function toggleMode(){
document.body.classList.toggle("light");
}

function addSym(s){
document.getElementById("text").value+=s;
}

function setCat(c){cat=c;}

function filter(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".box").forEach(b=>{
b.style.display=b.innerText.toLowerCase().includes(val)?"block":"none";
});
}

</script>

</body>
</html>
